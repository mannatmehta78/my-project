<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Bank UI</title>
  <link rel="stylesheet" href="Experiment2.css">
</head>
<body>
  <div class="container">
    <div class="balance" id="balance">$0</div>
    <button class="btn deposit" onclick="changeBalance(100)">Deposit</button>
    <button class="btn withdraw" onclick="changeBalance(-100)">Withdraw</button>
  </div>
  <script>
    let balance = 0;
    function changeBalance(amount) {
      if (balance + amount >= 0) {
        balance += amount;
        document.getElementById('balance').textContent = `$${balance}`;
      }
    }
  </script>
</body>
</html>
